default_language_version:
  node: 18.12.0

repos:
  ##############
  # Common stuff

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0 # Use the ref you want to point at
    hooks:
      - id: mixed-line-ending
        alias: eol
      - id: trailing-whitespace
        exclude_types: [svg]
      - id: end-of-file-fixer
        alias: eof
        exclude_types: [svg]

  # - repo: https://github.com/streetsidesoftware/cspell-cli
  #   rev: v6.30.1
  #   hooks:
  #     - id: cspell
  #       stages:
  #         - manual
  #       args:
  #         - --config=./.cspell/cspell.config.yml
  #         - --no-progress
  #         - --dot
  #         - --no-must-find-files
  #         - --no-summary
  #         - --gitignore
  #       additional_dependencies:
  #         - "@cspell/dict-en_us"
  #         - "@cspell/dict-fr-fr"
  #         - "@cspell/dict-fr-reforme"
  #         - "@cspell/dict-bash"
  #         - "@cspell/dict-shell"
  #         - "@cspell/dict-win32"

  ####
  # Js

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: eslint
        language: node
        # see: https://github.com/pre-commit/identify/blob/master/identify/extensions.py
        types_or: [vue, ts, tsx, javascript, jsx]
        args: [--config=.eslintrc.cjs]
        # Deps should be kept updated with `client/package-lock.json` !
        additional_dependencies:
          - "@typescript-eslint/eslint-plugin@6.21.0"
          - "@typescript-eslint/parser@6.21.0"
          - "@vue/eslint-config-typescript@12.0.0"
          - eslint@8.57.1
          - eslint-plugin-vue@9.33.0

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: >-
          npx prettier
          --config=.prettierrc.json5
          --ignore-path=.prettierignore
          --check
        language: node
        types_or: [vue, ts, tsx, javascript, jsx, html]
        additional_dependencies:
          - prettier@3.0.3
