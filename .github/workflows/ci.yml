name: Ci

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin v6.0.2
        timeout-minutes: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
        timeout-minutes: 2

      - name: Install dependencies
        run: npm install --ignore-scripts
        timeout-minutes: 2

      - name: Check lint
        run: npm run lint
        timeout-minutes: 2

      - name: Check prettier
        run: npm run prettier:check
        timeout-minutes: 2

      - name: Check knip
        run: npm run knip
        timeout-minutes: 2

  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin v6.0.2
        timeout-minutes: 2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin v6.4.0
        with:
          node-version-file: .tool-versions
          cache: npm
        timeout-minutes: 2

      - name: Install dependencies
        run: npm install --ignore-scripts
        timeout-minutes: 2

      - name: Run tests
        run: npm run test:unit
        timeout-minutes: 2
